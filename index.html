<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ancona Centro · Guida Ospiti V5.1</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0B1F33">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./img/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./img/icon-512.png">
    <meta name="apple-mobile-web-app-title" content="Ancona Guide">
    <link rel="icon" type="image/png" sizes="192x192" href="./img/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        :root{--navy:#0B1F33;--navy-2:#163350;--navy-3:#1E4A70;--gold:#C8A45A;--gold-2:#E2C07A;--gold-3:#F5E6C0;--white:#FFFFFF;--bg:#F3F0EA;--bg-2:#EAE6DD;--muted:#6B7280;--text:#1A2332;--border:rgba(200,164,90,.22);--shadow:0 2px 16px rgba(11,31,51,.10)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{scroll-behavior:smooth}
        body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        a{color:inherit;text-decoration:none}
        button{font-family:'Outfit',sans-serif;cursor:pointer}
        .header{background:var(--navy);color:var(--white);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.30);padding-top:env(safe-area-inset-top,0px)}
        .header-inner{display:flex;align-items:center;justify-content:space-between;padding:13px max(28px,calc(env(safe-area-inset-left,0px)+18px));padding-left:max(28px,calc(env(safe-area-inset-left,0px)+18px));padding-right:max(28px,calc(env(safe-area-inset-right,0px)+18px));border-bottom:1px solid rgba(200,164,90,.18)}
        .header-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:600;line-height:1.15;color:var(--white)}
        .header-sub{font-size:.65rem;font-weight:300;opacity:.6;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
        .header-cin{font-size:.6rem;font-weight:300;opacity:.5;letter-spacing:.05em;margin-top:2px;color:var(--gold-3)}
        .header-right{text-align:center}
        .lang-toggle{display:flex;background:rgba(255,255,255,.08);border-radius:22px;overflow:hidden;border:1px solid rgba(200,164,90,.30);justify-content:center}
        .lang-btn{padding:5px 11px;font-size:.68rem;font-weight:500;border:none;background:transparent;color:rgba(255,255,255,.55);transition:all .2s}
        .lang-btn.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600}
        .version-info{font-size:.55rem;color:var(--gold-3);text-align:center;margin-top:4px;opacity:.6;letter-spacing:.05em}
        .hero{width:100%;height:320px;overflow:hidden;position:relative;background:linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 50%,var(--navy-3) 100%);transition:height .3s ease}
        .hero.section-mode{height:68px}
        @media(max-height:700px){.hero.section-mode{height:48px}}
        .hero.section-mode .hero-caption{visibility:hidden}
        .hero-img{width:100%;height:100%;object-fit:cover;display:block;opacity:.55}
        .hero-overlay{position:absolute;inset:0;background:rgba(11,31,51,.45);pointer-events:none}
        .hero-caption{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--white);text-align:center;padding:0 24px}
        .hero-caption-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;line-height:1.1;letter-spacing:.02em;text-shadow:0 2px 12px rgba(0,0,0,.65)}
        .gold-bar{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
        .nav-scroll{display:flex;gap:7px;padding:11px 16px;overflow-x:auto;background:var(--navy-2);-webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap}
        .nav-scroll::-webkit-scrollbar{display:none}
        .nav-pill{flex-shrink:0;padding:6px 13px;border-radius:22px;font-size:.68rem;font-weight:500;border:1.5px solid rgba(200,164,90,.35);background:transparent;color:rgba(255,255,255,.60);transition:all .2s;white-space:nowrap}
        .nav-pill.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600}
        .nav-pill:active{transform:scale(.95)}
        .home-welcome{padding:16px 16px 12px;background:var(--white);border-bottom:1px solid var(--bg-2);display:flex;align-items:center;gap:16px}
        .home-welcome-left{flex-shrink:0}
        .host-photo{width:70px;height:70px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);display:block}
        .host-photo-placeholder{width:70px;height:70px;border-radius:50%;background:var(--bg-2);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--gold);border:2px solid var(--gold)}
        .home-welcome-right{flex:1}
        .home-welcome-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--navy);margin-bottom:4px}
        .home-welcome-sub{font-size:.75rem;color:var(--muted)}
        .home-social{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);border-radius:10px;padding:10px 14px;margin:8px 16px 0;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(200,164,90,.25);color:var(--white)}
        .home-social-label{color:rgba(255,255,255,.6);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em}
        .home-social-links{display:flex;gap:14px;align-items:center;margin-top:4px}
        .social-link{color:var(--gold-2);font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:4px;transition:color .2s}
        .social-link:hover{color:var(--gold-3)}
        .social-link:active{color:var(--gold)}
        .home-social-text{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:6px;line-height:1.4}
        .install-btn{display:none;background:var(--gold);color:var(--navy);border:none;padding:10px 20px;border-radius:30px;font-weight:600;font-size:.82rem;margin:12px 16px 0;box-shadow:var(--shadow);width:calc(100% - 32px);text-align:center}
        .home-whatsapp-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:#25D366;color:#fff;border:none;padding:9px 14px;border-radius:24px;font-weight:600;font-size:.72rem;box-shadow:var(--shadow);text-align:center;text-decoration:none;flex-shrink:0;white-space:nowrap}
        .install-btn:hover{background:var(--gold-2)}
        .nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 20px}
        .nav-tile{background:var(--white);border-radius:14px;padding:16px 14px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:flex-start;gap:6px;transition:transform .15s,box-shadow .15s;border-left:3px solid var(--gold)}
        .nav-tile:active{transform:scale(.97);box-shadow:none}
        .nav-tile-icon{font-size:1.4rem;line-height:1}
        .nav-tile-label{font-size:.8rem;font-weight:500;color:var(--navy);line-height:1.2}
        .section-header{background:var(--navy);padding:16px 18px 14px;border-bottom:2px solid var(--gold)}
        .section-header-inner{display:flex;align-items:center;gap:12px}
        .section-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:rgba(200,164,90,.18);flex-shrink:0}
        .section-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--white);line-height:1.1}
        .cards{padding:14px 14px 0;display:flex;flex-direction:column;gap:10px}
        .card{background:var(--white);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.05)}
        .card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);border-bottom:1px solid var(--border)}
        .card-header-icon{font-size:1rem}
        .card-title{font-weight:500;font-size:.85rem;color:var(--white)}
        .card-body{padding:12px 14px 14px;font-size:.82rem;line-height:1.6;color:var(--text)}
        .card-body a{color:var(--navy-3);font-weight:500;text-decoration:underline;text-decoration-color:rgba(30,74,112,.3)}
        .map-list-wrap{display:flex;height:min(340px,50vh);border-radius:13px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
        .section-map-el{flex:1;min-width:0;z-index:1;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%)}
        .place-btn-col{width:142px;overflow-y:auto;padding:5px;display:flex;flex-direction:column;gap:4px;background:var(--white);border-left:1px solid var(--bg-2);-webkit-overflow-scrolling:touch;scrollbar-width:thin}
        .place-btn-col::-webkit-scrollbar{width:3px}
        .place-btn-col::-webkit-scrollbar-thumb{background:var(--bg-2);border-radius:3px}
        .place-btn-mini{width:100%;text-align:left;padding:7px 8px;border-radius:8px;border:1px solid var(--bg-2);background:transparent;font-size:.65rem;color:var(--text);line-height:1.3;white-space:normal;transition:all .15s}
        .place-btn-mini.selected,.place-btn-mini:active{background:var(--navy);color:var(--white);border-color:var(--navy);border-left:3px solid var(--gold)}
        .map-marker-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--navy);border:2px solid var(--white);color:var(--white);font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.40)}
        .map-marker-num.cardeto,.map-marker-num.cittadella{background:#2E7D32}
        .map-marker-num.selected{background:var(--gold);color:var(--navy);transform:scale(1.25);z-index:999!important}
        .map-marker-num.has-sub{border-color:var(--gold);border-width:3px;cursor:pointer}
        .map-marker-star{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#FFD700;border:2px solid var(--white);color:var(--navy);font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.40)}
        .star-list-btn{width:100%;text-align:left;padding:7px 8px;border-radius:8px;border:1.5px solid #FFD700;background:#FFD700;font-size:.65rem;font-weight:700;color:var(--navy);line-height:1.3;cursor:pointer;transition:all .15s}
        .star-list-btn:active{background:#e6c200;border-color:#e6c200}
        .back-btn{display:inline-flex;align-items:center;gap:5px;background:none;border:none;color:var(--navy-3);font-size:.82rem;font-weight:500;padding:6px 0 4px}
        .back-btn:active{opacity:.6}
        .detail-photo-wrap{width:100%;height:200px;overflow:hidden;position:relative;background:var(--bg-2)}
        .detail-photo{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;display:block}
        .detail-photo.loaded{opacity:1}
        .detail-photo-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:linear-gradient(135deg,var(--bg-2),var(--bg));transition:opacity .3s;flex-direction:column;gap:6px;animation:shimmerPulse 1.8s ease-in-out infinite}
        .detail-photo-placeholder.hidden{opacity:0;pointer-events:none;animation:none}
        .detail-photo-link{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;text-decoration:none;color:inherit}
        .placeholder-emoji{font-size:2.5rem;margin-bottom:4px}
        .placeholder-text{font-size:.75rem;font-weight:500;color:var(--navy-3);text-align:center}
        @keyframes shimmerPulse{0%{opacity:.4}50%{opacity:.8}100%{opacity:.4}}
        .place-card{background:var(--white);border-radius:13px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
        .place-body{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
        .place-emoji-sm{font-size:1.1rem;min-width:22px;margin-top:2px}
        .place-name{font-weight:600;font-size:.9rem;margin-bottom:2px;color:var(--navy)}
        .place-desc{font-size:.77rem;color:var(--muted);line-height:1.5}
        .place-section-block{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
        .place-deep-toggle{display:flex;align-items:center;gap:6px;background:rgba(11,31,51,.05);border:1px solid var(--border);color:var(--navy);font-size:.78rem;font-weight:600;padding:7px 12px;border-radius:8px;cursor:pointer;width:100%;text-align:left;transition:background .15s}
        .place-deep-toggle:active{background:rgba(11,31,51,.1)}
        .place-deep-toggle::after{content:'▼';font-size:.5rem;margin-left:auto;transition:transform .2s;color:var(--muted)}
        .place-deep-toggle.open::after{transform:rotate(-180deg)}
        .place-deep-body{display:none;margin-top:8px;font-size:.77rem;color:var(--muted);line-height:1.55}
        .place-deep-body.open{display:block}
        .place-deep-body p{margin:0 0 8px}
        .place-deep-body b{color:var(--navy);font-weight:600}
        .place-meta{margin-top:8px;display:flex;flex-direction:column;gap:6px}
        .place-meta-row{font-size:.74rem;color:var(--navy-3);display:flex;gap:7px;align-items:flex-start;line-height:1.45}
        .place-meta-icon{flex-shrink:0;width:18px;font-size:.85rem}
        .place-next-tap{font-size:.73rem;color:var(--navy-3);margin-top:8px;padding-top:8px;border-top:1px solid var(--border);line-height:1.4;font-style:italic}
        .practical-block{background:var(--white);border-radius:13px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
        .practical-header{padding:12px 14px;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);display:flex;align-items:center;gap:10px}
        .practical-icon{font-size:1.1rem}
        .practical-title{font-weight:600;font-size:.85rem;color:var(--white)}
        .practical-body{padding:12px 14px 14px;font-size:.82rem;line-height:1.6;color:var(--text)}
        .practical-body a{color:var(--navy-3);font-weight:500;text-decoration:underline}
        .practical-brief{font-weight:500;color:var(--navy);margin-bottom:6px;font-size:.83rem}
        .practical-detail{color:var(--muted);font-size:.8rem;margin-bottom:6px}
        .practical-tip{background:rgba(200,164,90,.1);border-left:3px solid var(--gold);padding:8px 10px;border-radius:0 6px 6px 0;font-size:.77rem;color:var(--navy-3);margin-top:6px}
        .practical-tip strong{color:var(--navy);display:block;margin-bottom:2px;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
        .place-dist{font-size:.68rem;color:var(--gold);font-weight:600;margin-top:4px}
        .place-actions{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px}
        .map-button{display:inline-block;font-size:.68rem;color:var(--navy);background:var(--bg);padding:4px 10px;border-radius:16px;border:1px solid var(--border);font-weight:500}
        .map-button:active{background:var(--bg-2)}
        .detail-nav{display:flex;justify-content:space-between;align-items:center;padding:8px 2px 4px}
        .nav-detail-btn{background:var(--navy);color:var(--white);border:none;padding:8px 16px;border-radius:20px;font-size:.75rem;font-weight:500;transition:background .15s}
        .nav-detail-btn:active{background:var(--navy-3)}
        .detail-counter{font-size:.70rem;color:var(--muted)}
        .contact-card{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);border-radius:13px;padding:20px;color:var(--white);text-align:center;border:1px solid rgba(200,164,90,.20)}
        .contact-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;opacity:.5}
        .contact-number{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--gold-2);margin:10px 0 12px;letter-spacing:.04em}
        .contact-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
        .btn-wa{display:inline-flex;align-items:center;gap:6px;background:#25D366;color:var(--white);padding:9px 18px;border-radius:24px;font-size:.8rem;font-weight:500;text-decoration:none}
        .btn-call{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);color:var(--white);padding:9px 18px;border-radius:24px;font-size:.8rem;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.2)}
        .contact-email{font-size:.78rem;opacity:.65;margin-top:6px}
        .contact-email a{color:var(--gold-2)}
        .emerg-card{background:var(--white);border-radius:13px;overflow:hidden;margin-top:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
        .emerg-row{display:flex;align-items:center;padding:12px 14px;gap:12px;border-bottom:1px solid var(--bg-2)}
        .emerg-row:last-child{border-bottom:none}
        .emerg-num{font-size:.8rem;font-weight:700;color:var(--navy-3);min-width:110px}
        .emerg-desc{font-size:.8rem;color:var(--text)}
        .rule-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg-2)}
        .rule-row:last-child{border-bottom:none}
        .rule-icon{font-size:1.1rem}
        .rule-text{font-size:.8rem;line-height:1.4}
        .goto-home{display:flex;justify-content:center;margin:20px 0 30px}
        .home-btn{background:var(--navy);color:var(--white);border:none;padding:10px 22px;border-radius:30px;font-size:.78rem;font-weight:500;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--shadow)}
        .home-btn:active{transform:scale(.95)}
        .copyright-footer{text-align:center;padding:12px 16px;font-size:.62rem;color:var(--muted);border-top:1px solid var(--bg-2);margin-top:8px}
        .content{padding-bottom:40px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .section{display:none}
        .section.active{display:block;animation:fadeUp .28s ease}
        .link-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--bg-2)}
        .link-row:last-child{border-bottom:none}
        .link-icon{font-size:1.2rem;min-width:24px}
        .link-info{flex:1}
        .link-name{font-size:.82rem;font-weight:500;color:var(--navy)}
        .link-desc{font-size:.7rem;color:var(--muted);margin-top:1px}
        .link-action{font-size:.68rem;color:var(--navy-3);background:var(--bg);padding:4px 9px;border-radius:14px;border:1px solid var(--border);white-space:nowrap}
        .gps-container{position:relative}
        .gps-box{background:#FFF8E7;border:2px solid var(--gold);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .3s ease}
        .gps-box.collapsed{display:none}
        .gps-box .gps-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .gps-box .gps-icon{font-size:2rem;flex-shrink:0}
        .gps-box .gps-text{flex:1;font-size:.85rem;line-height:1.5;color:var(--text)}
        .gps-box .gps-text strong{color:var(--navy);font-weight:600}
        .gps-box .gps-buttons{display:flex;gap:8px;flex-wrap:wrap}
        .btn-gps-accept,.btn-gps-deny,.btn-gps-toggle{background:var(--navy);color:var(--white);border:none;padding:8px 16px;border-radius:30px;font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .25s;box-shadow:0 2px 8px rgba(11,31,51,.2)}
        .btn-gps-accept:hover,.btn-gps-toggle:hover{background:var(--navy-3)}
        .btn-gps-deny{background:transparent;color:var(--muted);box-shadow:none;border:1px solid var(--border)}
        .btn-gps-deny:hover{background:var(--bg-2)}
        .btn-gps-toggle.active{background:var(--gold);color:var(--navy);box-shadow:0 2px 8px rgba(200,164,90,.4)}
        .btn-gps-toggle:active,.btn-gps-accept:active,.btn-gps-deny:active{transform:scale(.95)}
        .gps-icon-overlay{position:absolute;bottom:20px;right:20px;z-index:1000;background:var(--white);border:2px solid var(--gold);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 2px 12px rgba(0,0,0,.15);cursor:pointer;transition:all .2s}
        .gps-icon-overlay:hover{transform:scale(1.05)}
        .gps-icon-overlay.active{background:var(--gold);border-color:var(--gold)}
        .gps-blue-dot-wrap{position:relative;width:20px;height:20px}
        .gps-blue-dot{width:14px;height:14px;background:#007AFF;border:2px solid var(--white);border-radius:50%;position:absolute;top:3px;left:3px;box-shadow:0 0 6px rgba(0,0,0,.3);z-index:2}
        .gps-blue-dot-pulse{width:20px;height:20px;background:rgba(0,122,255,.4);border-radius:50%;position:absolute;top:0;left:0;animation:gpsPulse 2s infinite ease-out;z-index:1}
        @keyframes gpsPulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(1.9);opacity:0}}
